<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平平无祈 - 代肝价格表</title>
    <!-- 引入 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Font Awesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 3px;
        }
        .tab-active {
            border-bottom: 3px solid #f43f5e;
            color: #f43f5e;
        }
        /* 隐藏原生横向滚动条但保留功能 */
        .scrollbar-none::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-none {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* 平滑色彩过渡 */
        body {
            transition: background-color 0.3s ease, color 0.3s ease, background-image 0.5s ease-in-out;
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            position: relative;
            z-index: 1;
        }

        /* 网页全局背景半透明遮罩（调暗背景图，防止喧宾夺主） */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-color: rgba(8, 10, 24, 0.78); /* 深色模式下调暗至 75% 压制过亮背景 */
            z-index: -1;
            transition: background-color 0.3s ease;
        }
        body.light-theme::before {
            background-color: rgba(255, 255, 255, 0.85); /* 浅色模式下调亮至 85% */
        }

        /* ==================== 磨砂玻璃视觉微调样式 ==================== */
        
        /* 顶部导航栏玻璃化 */
        header {
            background-color: rgba(15, 23, 42, 0.75) !important;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08) !important;
        }
        body.light-theme header {
            background-color: rgba(255, 255, 255, 0.80) !important;
            border-bottom: 1px solid rgba(15, 23, 42, 0.06) !important;
        }

        /* 标签栏文字阴影，防止被亮色背景吞掉 */
        #tab-starRail, #tab-endfield, #tab-mugen, #tab-zzz {
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }
        body.light-theme #tab-starRail, body.light-theme #tab-endfield, body.light-theme #tab-mugen, body.light-theme #tab-zzz {
            text-shadow: none;
        }

        /* 玻璃拟态卡片核心样式 - 调高背景不透明度至 88% */
        .game-card {
            background-color: rgba(17, 24, 39, 0.88) !important; /* 使用更实沉的深灰色，阻挡高亮背景 */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.12) !important;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.6);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* 强制重置卡片内文本颜色，提供极高对比度 */
        .game-card h3 {
            color: #ffffff !important;
            font-weight: 700 !important;
            font-size: 1.05rem !important;
        }
        .game-card p {
            color: #cbd5e1 !important; /* 亮灰色描述文本 */
            font-size: 0.75rem !important;
            line-height: 1.5 !important;
        }
        .game-card .card-action-text {
            color: #94a3b8 !important;
            font-weight: 600 !important;
        }

        .game-card:hover {
            background-color: rgba(17, 24, 39, 0.95) !important;
            border-color: rgba(244, 63, 94, 0.5) !important;
            transform: translateY(-2px);
            box-shadow: 0 12px 30px -5px rgba(244, 63, 94, 0.25);
        }
        .game-card.selected {
            background-color: rgba(17, 24, 39, 0.95) !important;
            border-color: #f43f5e !important;
            box-shadow: 0 0 22px rgba(244, 63, 94, 0.4) !important;
        }
        .game-card.selected h3 {
            color: #f43f5e !important;
        }
        .game-card.selected .card-action-text {
            color: #f43f5e !important;
        }

        /* 浅色主题模式下的卡片颜色 - 同样进行压实 */
        body.light-theme .game-card {
            background-color: rgba(255, 255, 255, 0.92) !important;
            border-color: rgba(15, 23, 42, 0.12) !important;
            box-shadow: 0 10px 30px -10px rgba(15, 23, 42, 0.1);
        }
        body.light-theme .game-card h3 {
            color: #0f172a !important; /* 深 slate 色标题 */
        }
        body.light-theme .game-card p {
            color: #334155 !important; /* 暗灰色描述文本 */
        }
        body.light-theme .game-card .card-action-text {
            color: #64748b !important;
        }
        body.light-theme .game-card:hover {
            background-color: rgba(255, 255, 255, 0.98) !important;
            border-color: rgba(225, 29, 72, 0.4) !important;
            box-shadow: 0 12px 30px -5px rgba(225, 29, 72, 0.15);
        }
        body.light-theme .game-card.selected {
            background-color: rgba(255, 255, 255, 0.98) !important;
            border-color: #e11d48 !important;
            box-shadow: 0 0 25px rgba(225, 29, 72, 0.2) !important;
        }
        body.light-theme .game-card.selected h3 {
            color: #e11d48 !important;
        }
        body.light-theme .game-card.selected .card-action-text {
            color: #e11d48 !important;
        }

        /* 统一大类标题、副标题与标签高可读性优化 */
        header h1 {
            color: #ffffff !important;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
            font-weight: 800 !important;
        }
        header p {
            color: #cbd5e1 !important;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
        }
        body.light-theme header h1 {
            color: #0f172a !important;
            text-shadow: none;
        }
        body.light-theme header p {
            color: #475569 !important;
            text-shadow: none;
        }

        /* 游戏大类 Tab 按钮 */
        #tab-starRail, #tab-endfield, #tab-mugen, #tab-zzz {
            color: #e2e8f0 !important; 
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
            font-weight: 700 !important;
            transition: all 0.3s ease;
        }
        #tab-starRail:hover, #tab-endfield:hover, #tab-mugen:hover, #tab-zzz:hover {
            color: #ffffff !important;
        }
        #tab-starRail.tab-active, #tab-endfield.tab-active, #tab-mugen.tab-active, #tab-zzz.tab-active {
            color: #fda4af !important; 
            border-bottom-color: #fda4af !important;
            text-shadow: 0 0 12px rgba(244, 63, 94, 0.6);
        }
        body.light-theme #tab-starRail, body.light-theme #tab-endfield, body.light-theme #tab-mugen, body.light-theme #tab-zzz {
            color: #475569 !important;
            text-shadow: none;
        }
        body.light-theme #tab-starRail.tab-active, body.light-theme #tab-endfield.tab-active, body.light-theme #tab-mugen.tab-active, body.light-theme #tab-zzz.tab-active {
            color: #e11d48 !important;
            border-bottom-color: #e11d48 !important;
        }

        /* 搜索输入框 */
        #searchInput {
            background-color: rgba(15, 23, 42, 0.65) !important;
            border: 1px solid rgba(255, 255, 255, 0.12) !important;
            color: #ffffff !important;
        }
        #searchInput::placeholder {
            color: #94a3b8 !important;
        }
        body.light-theme #searchInput {
            background-color: rgba(255, 255, 255, 0.85) !important;
            border: 1px solid rgba(15, 23, 42, 0.12) !important;
            color: #0f172a !important;
        }
        body.light-theme #searchInput::placeholder {
            color: #64748b !important;
        }

        /* 大分类标题 */
        .category-title-text {
            color: #ffffff !important;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.6);
        }
        body.light-theme .category-title-text {
            color: #0f172a !important;
            text-shadow: none;
        }

        /* ==================== 引导线与箭头样式 ==================== */
        .border-dashed {
            border-color: rgba(255, 255, 255, 0.25) !important;
        }
        body.light-theme .border-dashed {
            border-color: rgba(15, 23, 42, 0.15) !important;
        }
        .fa-arrow-right, .fa-arrow-left, .fa-arrow-down {
            color: #f43f5e !important; 
            text-shadow: 0 0 8px rgba(244, 63, 94, 0.6);
        }

        /* 侧边抽屉 */
        #cartDrawer, #tocDrawer {
            background-color: rgba(15, 23, 42, 0.8) !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255, 255, 255, 0.06) !important;
        }
        body.light-theme #cartDrawer, body.light-theme #tocDrawer {
            background-color: rgba(255, 255, 255, 0.82) !important;
            border-left: 1px solid rgba(15, 23, 42, 0.06) !important;
        }
        #cartDrawer .bg-slate-950, #tocDrawer .bg-slate-950 {
            background-color: rgba(15, 23, 42, 0.3) !important;
        }
        body.light-theme #cartDrawer .bg-slate-950, body.light-theme #tocDrawer .bg-slate-950 {
            background-color: rgba(255, 255, 255, 0.2) !important;
        }

        /* 页脚 */
        footer {
            background-color: rgba(15, 23, 42, 0.8) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.05) !important;
        }
        body.light-theme footer {
            background-color: rgba(241, 245, 249, 0.8) !important;
            border-top: 1px solid rgba(15, 23, 42, 0.05) !important;
        }

        /* 深色模式下的联系面板 */
        footer .cursor-pointer {
            background-color: rgba(17, 24, 39, 0.90) !important; /* 使用和卡片一致的深黑曜石背景 */
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
        }
        footer .cursor-pointer:hover {
            background-color: rgba(17, 24, 39, 0.98) !important;
            border-color: rgba(244, 63, 94, 0.5) !important;
            transform: translateY(-2px);
        }
        footer h3 {
            color: #ffffff !important;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.6);
        }
        footer p.text-slate-400 {
            color: #cbd5e1 !important; /* 彻底提亮说明字 */
        }
        footer p.text-slate-200 {
            color: #ffffff !important; /* 号码直观高亮显示 */
            font-size: 0.95rem !important;
        }
        footer .fa-copy {
            color: #94a3b8 !important;
        }

        /* 浅色模式下的联系面板 */
        body.light-theme footer h3 {
            color: #0f172a !important;
            text-shadow: none;
        }
        body.light-theme footer .cursor-pointer {
            background-color: rgba(255, 255, 255, 0.95) !important; /* 亮白色白瓷面板 */
            border: 1px solid rgba(15, 23, 42, 0.12) !important;
            box-shadow: 0 4px 15px rgba(15, 23, 42, 0.05);
        }
        body.light-theme footer .cursor-pointer:hover {
            background-color: #ffffff !important;
            border-color: rgba(225, 29, 72, 0.4) !important;
        }
        body.light-theme footer p.text-slate-400 {
            color: #475569 !important; /* 采用更深的 slate 色 */
        }
        body.light-theme footer p.text-slate-200 {
            color: #0f172a !important; /* 纯黑核心字 */
        }
        body.light-theme footer .fa-copy {
            color: #64748b !important;
        }

        /* 蛇形连接符背景 */
        .theme-bg-adapt {
            background-color: rgba(15, 23, 42, 0.85) !important;
        }
        body.light-theme .theme-bg-adapt {
            background-color: rgba(255, 255, 255, 0.85) !important;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col font-sans overflow-x-hidden">

    <!-- 导航栏 -->
    <header class="sticky top-0 z-50 transition-colors duration-300">
        <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-rose-500 to-indigo-500 flex items-center justify-center font-bold text-lg text-white">
                    祈
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-wider">平平无祈</h1>
                    <p class="text-xs text-slate-400">专业托管 · 高效安全 · 价格透明</p>
                </div>
            </div>
            <!-- 搜索框 & 主题开关 -->
            <div class="flex items-center gap-2 w-full sm:w-auto relative">
                <div class="relative flex-grow sm:w-64">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </span>
                    <input id="searchInput" type="text" placeholder="搜索代肝项目 (如: 日常、深渊、主线)..." oninput="handleSearchInput()"
                           class="w-full pl-10 pr-4 py-2 bg-slate-800 border border-slate-700 rounded-full text-sm text-slate-200 focus:outline-none focus:border-rose-500 transition-colors">
                    
                    <!-- 搜索建议下拉弹窗 -->
                    <div id="searchSuggestions" class="absolute left-0 right-0 top-full mt-2 bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl max-h-64 overflow-y-auto z-50 hidden transition-all duration-300">
                        <!-- 动态渲染建议项 -->
                    </div>
                </div>
                <!-- 主题切换按钮 -->
                <button onclick="toggleTheme()" id="themeToggleBtn" class="p-2 bg-slate-800 border border-slate-700 hover:border-slate-500 rounded-full text-slate-300 transition-all flex items-center justify-center shrink-0 w-10 h-10" title="切换深色/浅色模式">
                    <i class="fa-solid fa-moon text-lg" id="themeIcon"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- 主体区域 -->
    <main class="flex-grow max-w-6xl w-full mx-auto px-4 py-6">
        
        <!-- 游戏选择 Tabs -->
        <div class="flex border-b border-slate-800 mb-6 overflow-x-auto justify-start sm:justify-center gap-2 sm:gap-8 pb-px scrollbar-none">
            <button onclick="switchGame('starRail')" id="tab-starRail" class="py-3 px-6 text-slate-400 font-semibold text-base whitespace-nowrap transition-all duration-300 hover:text-slate-200">
                <i class="fa-solid fa-wand-magic-sparkles mr-2"></i>崩坏：星穹铁道
            </button>
            <button onclick="switchGame('endfield')" id="tab-endfield" class="py-3 px-6 text-slate-400 font-semibold text-base whitespace-nowrap transition-all duration-300 hover:text-slate-200">
                <i class="fa-solid fa-shield-halved mr-2"></i>明日方舟：终末地
            </button>
            <button onclick="switchGame('mugen')" id="tab-mugen" class="py-3 px-6 text-slate-400 font-semibold text-base whitespace-nowrap transition-all duration-300 hover:text-slate-200">
                <i class="fa-solid fa-circle-nodes mr-2"></i>异环
            </button>
            <button onclick="switchGame('zzz')" id="tab-zzz" class="py-3 px-6 text-slate-400 font-semibold text-base whitespace-nowrap transition-all duration-300 hover:text-slate-200">
                <i class="fa-solid fa-bolt mr-2"></i>绝区零
            </button>
        </div>

        <!-- 价格展示区 -->
        <div id="priceContainer" class="space-y-12">
            <!-- 由 JavaScript 动态渲染 -->
        </div>

    </main>

    <!-- 页脚与联系方式 -->
    <footer class="mt-12 py-8 transition-colors duration-300">
        <div class="max-w-6xl mx-auto px-4">
            <h3 class="text-center text-lg font-bold text-slate-300 mb-6">—— 联系我 & 快速下单 ——</h3>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-8">
                <!-- 微信 -->
                <div onclick="copyText('ppwq1115', '微信')" class="cursor-pointer transition-all rounded-xl p-4 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <i class="fa-brands fa-weixin text-green-400 text-2xl w-8 text-center"></i>
                        <div>
                            <p class="text-xs text-slate-400 font-semibold">微信号 (点击复制)</p>
                            <p class="text-sm font-semibold text-slate-200">ppwq1115</p>
                        </div>
                    </div>
                    <i class="fa-regular fa-copy text-slate-500 text-sm"></i>
                </div>
                <!-- QQ -->
                <div onclick="copyText('2080752235', 'QQ')" class="cursor-pointer transition-all rounded-xl p-4 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <i class="fa-brands fa-qq text-blue-400 text-2xl w-8 text-center"></i>
                        <div>
                            <p class="text-xs text-slate-400 font-semibold">QQ号 (点击复制)</p>
                            <p class="text-sm font-semibold text-slate-200">2080752235</p>
                        </div>
                    </div>
                    <i class="fa-regular fa-copy text-slate-500 text-sm"></i>
                </div>
                <!-- Bilibili -->
                <div onclick="copyText('3181225', 'B站直播间')" class="cursor-pointer transition-all rounded-xl p-4 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <i class="fa-brands fa-bilibili text-pink-400 text-2xl w-8 text-center"></i>
                        <div>
                            <p class="text-xs text-slate-400">B站直播 (10:00——22:00)</p>
                            <p class="text-sm font-semibold text-slate-200">房号: 3181225</p>
                        </div>
                    </div>
                    <i class="fa-regular fa-copy text-slate-500 text-sm"></i>
                </div>
            </div>
        </div>
    </footer>

    <!-- 左下角悬浮目录罗盘 -->
    <div id="floatingTocBtn" class="fixed bottom-6 left-6 z-40 hidden">
        <button onclick="toggleTocDrawer()" class="bg-indigo-600 hover:bg-indigo-700 text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center transition-all transform hover:scale-105 active:scale-95">
            <i class="fa-solid fa-compass text-xl"></i>
        </button>
    </div>

    <!-- Left side directory drawer -->
    <div id="tocDrawer" class="fixed inset-y-0 left-0 w-full sm:w-80 bg-slate-900 border-r border-slate-800 shadow-2xl z-50 transform -translate-x-full transition-transform duration-300 flex flex-col">
        <div class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-950">
            <h3 class="text-lg font-bold text-indigo-400 flex items-center gap-2">
                <i class="fa-solid fa-compass"></i> 快速目录跳转
            </h3>
            <button onclick="toggleTocDrawer()" class="text-slate-400 hover:text-slate-200 p-1">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
        </div>
        <div id="tocItemsList" class="flex-grow overflow-y-auto p-4 space-y-2">
            <!-- 动态载入定位导航按钮 -->
        </div>
    </div>
    <div id="tocBackdrop" onclick="toggleTocDrawer()" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 hidden transition-opacity duration-300 opacity-0"></div>

    <!-- 右下角悬浮购物篮 -->
    <div id="floatingCartBtn" class="fixed bottom-6 right-6 z-40 hidden">
        <button onclick="toggleCartDrawer()" class="relative bg-rose-500 hover:bg-rose-600 text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center transition-all transform hover:scale-105 active:scale-95">
            <i class="fa-solid fa-basket-shopping text-xl"></i>
            <span id="cartCountBadge" class="absolute -top-1.5 -right-1.5 bg-indigo-600 text-white text-xs font-bold rounded-full w-6 h-6 flex items-center justify-center border-2 border-slate-950">0</span>
        </button>
    </div>

    <!-- 购物篮侧边抽屉 -->
    <div id="cartDrawer" class="fixed inset-y-0 right-0 w-full sm:w-96 bg-slate-900 border-l border-slate-800 shadow-2xl z-50 transform translate-x-full transition-transform duration-300 flex flex-col">
        <!-- 头部 -->
        <div class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-950">
            <h3 class="text-lg font-bold text-rose-400 flex items-center gap-2">
                <i class="fa-solid fa-basket-shopping"></i> 已选代肝清单
            </h3>
            <button onclick="toggleCartDrawer()" class="text-slate-400 hover:text-rose-200 p-1">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
        </div>
        <!-- 选购明细列表 -->
        <div id="cartItemsList" class="flex-grow overflow-y-auto p-4 space-y-3">
            <!-- 动态载入清单项目 -->
        </div>
        <!-- 结算及复制 -->
        <div class="p-4 border-t border-slate-800 bg-slate-950 space-y-4">
            <div class="flex justify-between items-center text-sm">
                <span class="text-slate-400">已选择项目数:</span>
                <span id="cartCountText" class="font-bold text-slate-200">0 项</span>
            </div>
            <div class="flex justify-between items-center border-t border-slate-800/60 pt-3">
                <span class="text-slate-300 font-semibold">估算合计总价:</span>
                <span id="cartTotalText" class="text-xl font-bold text-rose-400">0 R</span>
            </div>
            <p class="text-[10px] text-slate-500 text-center leading-relaxed">
                * 估算金额仅基于已标注具体R值（提取首个数字）的项目。若含“分项/议价/自选/面议/区间价格”项目需私信确定。

        // 购物车数组，保存已选代的项目
        let cart = [];

        let currentActiveGame = 'starRail';

        // 提取价格的辅助函数
        function parsePrice(priceStr) {
            if (!priceStr) return null;
            // 清理中文括号等内容
            const cleaned = priceStr.replace(/（[^）]*）/g, '').replace(/\([^)]*\)/g, '');
            // 匹配格式如 "45R" 或 "15R / 幕" 中的数字部分
            const match = cleaned.match(/(\d+(?:\.\d+)?)\s*R/i);
            if (match) {
                return parseFloat(match[1]);
            }
            return null;
        }

        // 获取游戏中文友好名称
        function getGameFriendlyName(gameKey) {
            if (gameKey === 'starRail') return '星穹铁道';
            if (gameKey === 'endfield') return '终末地';
            if (gameKey === 'mugen') return '异环';
            if (gameKey === 'zzz') return '绝区零';
            return gameKey;
        }

        // 切换代肝项到购物车中
        function toggleCartItem(gameKey, categoryName, itemName, priceStr) {
            const itemId = `${gameKey}-${categoryName}-${itemName}`;
            const index = cart.findIndex(item => item.id === itemId);

            if (index > -1) {
                // 已存在，则移除
                cart.splice(index, 1);
            } else {
                // 不存在，则添加
                const parsed = parsePrice(priceStr);
                cart.push({
                    id: itemId,
                    gameKey: gameKey,
                    gameName: getGameFriendlyName(gameKey),
                    category: categoryName,
                    name: itemName,
                    price: priceStr,
                    parsedPrice: parsed
                });
            }

            updateCartUI();
            renderData(); // 重新渲染列表以更新选中卡片样式
        }

        // 移除单项
        function removeCartItem(itemId) {
            cart = cart.filter(item => item.id !== itemId);
            updateCartUI();
            renderData();
        }

        // 清空购物车
        function clearCart() {
            cart = [];
            updateCartUI();
            renderData();
        }

        // 切换购物车抽屉开关
        function toggleCartDrawer() {
            const drawer = document.getElementById('cartDrawer');
            const backdrop = document.getElementById('cartBackdrop');
            const isOpen = !drawer.classList.contains('translate-x-full');

            if (isOpen) {
                drawer.classList.add('translate-x-full');
                backdrop.classList.add('opacity-0');
                setTimeout(() => backdrop.classList.add('hidden'), 300);
            } else {
                // 确保打开购物车时收起左侧目录抽屉
                closeTocDrawer();
                
                backdrop.classList.remove('hidden');
                setTimeout(() => backdrop.classList.remove('opacity-0'), 10);
                drawer.classList.remove('translate-x-full');
            }
        }

        // 切换左侧目录抽屉开关
        function toggleTocDrawer() {
            const drawer = document.getElementById('tocDrawer');
            const backdrop = document.getElementById('tocBackdrop');
            const isOpen = !drawer.classList.contains('-translate-x-full');

            if (isOpen) {
                closeTocDrawer();
            } else {
                // 确保打开左侧目录时收起右侧购物车
                const cartDrawer = document.getElementById('cartDrawer');
                if (!cartDrawer.classList.contains('translate-x-full')) {
                    cartDrawer.classList.add('translate-x-full');
                }
                
                backdrop.classList.remove('hidden');
                setTimeout(() => backdrop.classList.remove('opacity-0'), 10);
                drawer.classList.remove('-translate-x-full');
            }
        }

        // 强制收起左侧目录抽屉
        function closeTocDrawer() {
            const drawer = document.getElementById('tocDrawer');
            const backdrop = document.getElementById('tocBackdrop');
            if (!drawer.classList.contains('-translate-x-full')) {
                drawer.classList.add('-translate-x-full');
                backdrop.classList.add('opacity-0');
                setTimeout(() => backdrop.classList.add('hidden'), 300);
            }
        }

        // 更新购物车界面UI数据
        function updateCartUI() {
            const floatingCartBtn = document.getElementById('floatingCartBtn');
            const badge = document.getElementById('cartCountBadge');
            const countText = document.getElementById('cartCountText');
            const listContainer = document.getElementById('cartItemsList');
            const totalText = document.getElementById('cartTotalText');

            if (cart.length > 0) {
                floatingCartBtn.classList.remove('hidden');
                badge.innerText = cart.length;
                countText.innerText = `${cart.length} 项`;
            } else {
                floatingCartBtn.classList.add('hidden');
                badge.innerText = '0';
                countText.innerText = '0 项';
            }

            // 渲染列表
            listContainer.innerHTML = '';
            let total = 0;
            let hasComplexPrice = false;

            if (cart.length === 0) {
                listContainer.innerHTML = `
                    <div class="text-center py-16 text-slate-500">
                        <i class="fa-solid fa-basket-shopping text-3xl mb-3 block"></i>
                        <p class="text-sm">暂无选购项目，快去上方挑选点击吧！</p>
                    </div>
                `;
                totalText.innerText = '0 R';
                return;
            }

            cart.forEach(item => {
                if (item.parsedPrice !== null) {
                    total += item.parsedPrice;
                } else {
                    hasComplexPrice = true;
                }

                const itemDiv = document.createElement('div');
                itemDiv.className = 'bg-slate-800/80 border border-slate-700/60 p-3 rounded-xl flex justify-between items-start gap-3 hover:bg-slate-800 transition-colors';
                itemDiv.innerHTML = `
                    <div class="flex-grow">
                        <div class="flex flex-wrap gap-1.5 items-center">
                            <span class="text-[9px] bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 px-1.5 py-0.5 rounded font-bold">
                                ${item.gameName}
                            </span>
                            <span class="text-[9px] bg-slate-700 text-slate-300 px-1.5 py-0.5 rounded">
                                ${item.category}
                            </span>
                        </div>
                        <h4 class="font-bold text-slate-100 text-xs mt-2"><b>${item.name}</b></h4>
                        <p class="text-xs text-rose-400 font-semibold mt-1">价目: ${item.price}</p>
                    </div>
                    <button onclick="removeCartItem('${item.id}')" class="text-slate-400 hover:text-rose-400 p-1 transition-colors">
                        <i class="fa-solid fa-trash-can text-sm"></i>
                    </button>
                `;
                listContainer.appendChild(itemDiv);
            });

            // 累加总额
            totalText.innerHTML = `${total.toFixed(1).replace(/\.0$/, '')} R ${hasComplexPrice ? '<span class="text-xs text-slate-400 font-normal">(含自选/分项/面议/区间价格)</span>' : ''}`;
        }

        // 一键生成与复制预约清单
        function copyCartOrder() {
            if (cart.length === 0) return;

            let total = 0;
            let hasComplexPrice = false;
            let orderText = `✨ 【平平无祈】订单预约清单 ✨\n\n`;

            // 分组归纳
            const grouped = {};
            cart.forEach(item => {
                if (!grouped[item.gameName]) grouped[item.gameName] = [];
                grouped[item.gameName].push(item);
                if (item.parsedPrice !== null) {
                    total += item.parsedPrice;
                } else {
                    hasComplexPrice = true;
                }
            });

            for (const gameName in grouped) {
                orderText += `🎮 【${gameName}】\n`;
                grouped[gameName].forEach(item => {
                    orderText += `  ▫️ ${item.category} - ${item.name} (${item.price})\n`;
                });
                orderText += `\n`;
            }

            orderText += `-----------------------\n`;
            orderText += `📊 已选项目总数: ${cart.length} 项\n`;
            orderText += `💰 估算合计金额: ${total.toFixed(1).replace(/\.0$/, '')} R ${hasComplexPrice ? '(包含部分分项收费/自选项目/面议/区间价格)' : ''}\n\n`;
            orderText += `💬 我的联系信息:\n`;
            orderText += `  ▫️ QQ: 2080752235\n`;
            orderText += `  ▫️ 微信: ppwq1115\n`;
            orderText += `* 复制此预约单发给平平无祈，即可高效确认沟通和安排！`;

            navigator.clipboard.writeText(orderText).then(() => {
                const toast = document.getElementById('toast');
                const toastMsg = document.getElementById('toastMsg');
                toastMsg.innerText = `预约订单清单已完美复制！快去私聊粘贴发送吧！`;
                
                toast.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-2');
                toast.classList.add('opacity-100', 'translate-y-0');

                setTimeout(() => {
                    toast.classList.add('opacity-0', 'pointer-events-none', 'translate-y-2');
                    toast.classList.remove('opacity-100', 'translate-y-0');
                }, 2500);
            }).catch(() => {
                alert('复制失败，请截屏发给代肝确认订单。');
            });
        }

        // 切换标签
        function switchGame(gameKey) {
            // 新增：切换板块时，自动清空搜索输入框，恢复全局完整展现
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.value = '';
            }
            // 新增：隐藏可能展开的搜索建议下拉框
            const suggestions = document.getElementById('searchSuggestions');
            if (suggestions) {
                suggestions.classList.add('hidden');
            }

            currentActiveGame = gameKey;
            
            // 切换大类（游戏Tab）时，同步更换该游戏专属的全局网页背景图
            if (GAME_BACKGROUNDS[gameKey]) {
                document.body.style.backgroundImage = `url('${GAME_BACKGROUNDS[gameKey]}')`;
            }

            const tabs = ['starRail', 'endfield', 'mugen', 'zzz'];
            tabs.forEach(tab => {
                const btn = document.getElementById(`tab-${tab}`);
                if (tab === gameKey) {
                    btn.classList.add('tab-active', 'text-rose-400');
                    btn.classList.remove('text-slate-400');
                } else {
                    btn.classList.remove('tab-active', 'text-rose-400');
                    btn.classList.add('text-slate-400');
                }
            });

            renderData();
        }

        // 锚点跳转功能
        function scrollToCategory(id) {
            const element = document.getElementById(id);
            if (element) {
                // 导航高度偏移
                const headerOffset = 80; 
                const elementPosition = element.getBoundingClientRect().top;
                const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
                
                window.scrollTo({
                    top: offsetPosition,
                    behavior: "smooth"
                });
            }
        }

        // 点击目录项并自动关闭目录抽屉
        function scrollToCategoryAndClose(id) {
            scrollToCategory(id);
            closeTocDrawer();
        }

        // 搜索栏输入实时展现联想菜单
        function handleSearchInput() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            const suggestions = document.getElementById('searchSuggestions');
            suggestions.innerHTML = '';

            if (!query) {
                suggestions.classList.add('hidden');
                return;
            }

            const gameData = SERVICES_DATA[currentActiveGame];
            const matches = [];

            // 全局搜寻匹配
            gameData.categories.forEach((category, catIndex) => {
                category.items.forEach((item, itemIndex) => {
                    if (item.name.toLowerCase().includes(query) || item.desc.toLowerCase().includes(query)) {
                        matches.push({
                            categoryName: category.name,
                            catIndex: catIndex,
                            itemName: item.name,
                            price: item.price,
                            itemIndex: itemIndex
                        });
                    }
                });
            });

            // 渲染联想框
            if (matches.length > 0) {
                suggestions.classList.remove('hidden');
                // 限制最多展示 8 条，避免下拉太长
                matches.slice(0, 8).forEach(match => {
                    const div = document.createElement('div');
                    div.className = "suggestion-item p-3 border-b border-slate-800/60 cursor-pointer hover:bg-slate-800/50 flex justify-between items-center text-xs text-slate-300 transition-colors";
                    
                    const cardId = `${currentActiveGame}-card-${match.catIndex}-${match.itemIndex}`;
                    div.setAttribute('onclick', `scrollToAndHighlight('${cardId}')`);
                    
                    div.innerHTML = `
                        <div>
                            <span class="text-[9px] text-slate-500 font-semibold mr-1.5">[${match.categoryName}]</span>
                            <span class="font-bold text-slate-200">${match.itemName}</span>
                        </div>
                        <span class="text-rose-400 font-bold text-[9px] bg-rose-500/10 px-2 py-0.5 rounded">${match.price}</span>
                    `;
                    suggestions.appendChild(div);
                });
            } else {
                suggestions.classList.remove('hidden');
                suggestions.innerHTML = `
                    <div class="p-4 text-center text-xs text-slate-500">
                        未找到匹配项目
                    </div>
                `;
            }
        }

        // 快速跳转至对应项目卡片并高亮闪烁
        function scrollToAndHighlight(cardId) {
            // 1. 清空输入框并收起联想菜单
            document.getElementById('searchInput').value = '';
            document.getElementById('searchSuggestions').classList.add('hidden');

            // 2. 重新载入全量列表（以防刚才在过滤状态下）
            renderData();

            // 3. 平滑滚动定位并闪烁
            setTimeout(() => {
                const element = document.getElementById(cardId);
                if (element) {
                    const headerOffset = 80;
                    const elementPosition = element.getBoundingClientRect().top;
                    const offsetPosition = elementPosition + window.pageYOffset - headerOffset;

                    window.scrollTo({
                        top: offsetPosition,
                        behavior: "smooth"
                    });

                    // 4. 触发高亮呼吸闪烁样式
                    element.classList.add('card-flash-effect');
                    setTimeout(() => {
                        element.classList.remove('card-flash-effect');
                    }, 2400); // 0.8s * 3次 = 2.4秒
                }
            }, 100);
        }

        // 切换深浅色主题
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('themeIcon');
            const isLight = body.classList.toggle('light-theme');
            
            if (isLight) {
                icon.className = 'fa-solid fa-sun';
                localStorage.setItem('theme', 'light');
            } else {
                icon.className = 'fa-solid fa-moon';
                localStorage.setItem('theme', 'dark');
            }
            renderData(); // 主题切换时重新渲染以更新卡片背景罩色调
        }

        // 渲染页面数据
        function renderData() {
            const searchInput = document.getElementById('searchInput').value.trim().toLowerCase();
            const container = document.getElementById('priceContainer');
            container.innerHTML = '';

            const gameData = SERVICES_DATA[currentActiveGame];

            // 检查当前是否为浅色模式
            const isLightTheme = document.body.classList.contains('light-theme');
            
            // 动态配置卡片背景渐变遮罩，在卡片背后的角色/版本图上盖一层半透明罩，防止文字与亮图冲突，保障可读性
            const overlayGradient = isLightTheme
                ? 'linear-gradient(to bottom, rgba(255, 255, 255, 0.88), rgba(255, 255, 255, 0.96))'
                : 'linear-gradient(to bottom, rgba(17, 24, 39, 0.82), rgba(17, 24, 39, 0.95))';

            // 动态生成左侧抽屉内的目录跳转列表 (搜索状态下隐藏)
            const tocItemsList = document.getElementById('tocItemsList');
            const floatingTocBtn = document.getElementById('floatingTocBtn');
            tocItemsList.innerHTML = '';
            
            if (gameData.categories.length > 0 && !searchInput) {
                floatingTocBtn.classList.remove('hidden');
                
                gameData.categories.forEach((category, index) => {
                    const btn = document.createElement('button');
                    // 样式为圆角宽扁的目录项卡片
                    btn.className = "toc-pill w-full text-left px-4 py-3 bg-slate-800/60 border border-slate-700/50 hover:bg-slate-800 hover:border-slate-600 rounded-xl text-sm font-semibold text-slate-300 transition-all flex items-center justify-between group";
                    btn.setAttribute('onclick', `scrollToCategoryAndClose('cat-${index}')`);
                    btn.innerHTML = `
                        <span>${category.name}</span>
                        <i class="fa-solid fa-chevron-right text-xs text-slate-500 group-hover:text-slate-300 transition-colors"></i>
                    `;
                    tocItemsList.appendChild(btn);
                });
            } else {
                floatingTocBtn.classList.add('hidden');
            }
            
            // 循环生成各区段卡片
            gameData.categories.forEach((category, index) => {
                const filteredItems = category.items.filter(item => {
                    return item.name.toLowerCase().includes(searchInput) || 
                           item.desc.toLowerCase().includes(searchInput);
                });

                if (filteredItems.length === 0) return;

                const categorySection = document.createElement('div');
                categorySection.id = `cat-${index}`;
                categorySection.className = 'transition-all duration-300';

                const titleHtml = `
                    <div class="flex items-center gap-2 mb-6 border-l-4 border-rose-500 pl-3 mt-4 category-title-wrap">
                        <h2 class="text-lg font-bold text-slate-100 tracking-wide category-title-text">${category.name}</h2>
                        <span class="text-xs bg-rose-500/10 text-rose-400 border border-rose-500/20 px-2 py-0.5 rounded-full">
                            ${filteredItems.length}
                        </span>
                    </div>
                `;
                categorySection.innerHTML = titleHtml;

                // 【特殊编排模式】 异环 / 终末地 / 绝区零 主线任务 - 直时间轴 (只有无搜索状态下触发)
                const isTimelineLayout = (!searchInput) && (
                    (currentActiveGame === 'mugen' && category.name === "主线任务 (时间轴)") ||
                    (currentActiveGame === 'endfield' && category.name === "主线剧情任务 (精密关卡拆分卡片)") ||
                    (currentActiveGame === 'zzz' && category.name === "主线剧情 (时间轴)")
                );

                if (isTimelineLayout) {
                    const timelineContainer = document.createElement('div');
                    timelineContainer.className = 'relative max-w-3xl mx-auto py-4 space-y-6';

                    // 垂直时间轴主导线
                    const line = document.createElement('div');
                    line.className = `absolute left-4 sm:left-5 top-2 bottom-2 w-0.5 bg-gradient-to-b from-rose-500 to-indigo-500 ${isLightTheme ? 'opacity-40' : 'opacity-60'}`;
                    timelineContainer.appendChild(line);

                    filteredItems.forEach((item, idx) => {
                        const itemId = `${currentActiveGame}-${category.name}-${item.name}`;
                        const isSelected = cart.some(cartItem => cartItem.id === itemId);
                        const cardId = `${currentActiveGame}-card-${index}-${idx}`;

                        const itemDiv = document.createElement('div');
                        itemDiv.className = 'relative pl-10 sm:pl-12';

                        // 区分深浅色以及选中状态的圆圈颜色
                        const dotColor = isSelected 
                            ? 'bg-rose-500 text-white ring-rose-500/20' 
                            : (isLightTheme 
                                ? 'bg-slate-200 text-slate-600 ring-slate-100' 
                                : 'bg-slate-800 text-slate-400 ring-slate-800/30');
                        
                        const dotBorderClass = isLightTheme ? 'border-white' : 'border-slate-950';

                        itemDiv.innerHTML = `
                            <!-- 时间轴节点 -->
                            <div class="absolute left-4 sm:left-5 -translate-x-1/2 top-4 z-10 flex items-center justify-center">
                                <div class="w-6 h-6 rounded-full ${dotColor} ${dotBorderClass} ring-4 border-2 flex items-center justify-center transition-all duration-300 shadow-sm">
                                    <span class="text-[9px] font-bold">${String(idx + 1).padStart(2, '0')}</span>
                                </div>
                            </div>
                            
                            <!-- 时间轴卡片 -->
                            <div id="${cardId}" onclick="toggleCartItem('${currentActiveGame}', '${category.name}', '${item.name}', '${item.price}')"
                                 class="border rounded-xl p-4 cursor-pointer game-card transition-all duration-300 hover:bg-slate-900 ${
                                    isSelected ? 'selected' : ''
                                 }">
                                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-2 mb-2">
                                    <h3 class="font-bold text-sm sm:text-base flex items-center gap-1.5 ${isSelected ? 'text-rose-400' : 'text-slate-100'}">
                                        ${isSelected ? '<i class="fa-solid fa-circle-check text-rose-500 text-xs"></i>' : ''}
                                        ${item.name}
                                    </h3>
                                    <span class="bg-rose-500/10 text-rose-400 text-xs font-bold px-2.5 py-0.5 rounded-full whitespace-nowrap border border-rose-500/10 self-start sm:self-center">
                                        ${item.price}
                                    </span>
                                </div>
                                <p class="text-xs text-slate-400 leading-relaxed">${item.desc}</p>
                            </div>
                        `;
                        timelineContainer.appendChild(itemDiv);
                    });

                    categorySection.appendChild(timelineContainer);
                    container.appendChild(categorySection);
                    return; // 提前退出以跳过默认卡片网格渲染
                }

                // 默认 3 列弹性卡片网格渲染
                const gridDiv = document.createElement('div');
                gridDiv.className = 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6';

                filteredItems.forEach((item, itemIndex) => {
                    const itemId = `${currentActiveGame}-${category.name}-${item.name}`;
                    const isSelected = cart.some(cartItem => cartItem.id === itemId);
                    
                    // 绑定精确 of 元素卡片ID，便于联想搜索后定位
                    const cardId = `${currentActiveGame}-card-${index}-${itemIndex}`;

                    const card = document.createElement('div');
                    card.id = cardId;
                    card.className = `border rounded-2xl p-5 hover:bg-slate-900 transition-all duration-300 flex flex-col justify-between group cursor-pointer game-card ${
                        isSelected 
                            ? 'selected' 
                            : ''
                    }`;
                    card.setAttribute('onclick', `toggleCartItem('${currentActiveGame}', '${category.name}', '${item.name}', '${item.price}')`);
                    
                    card.innerHTML = `
                        <div>
                            <div class="flex justify-between items-start gap-4 mb-3">
                                <h3 class="font-bold transition-colors text-base flex items-center gap-1.5 ${isSelected ? 'text-rose-400' : 'text-slate-100'}">
                                    ${isSelected ? '<i class="fa-solid fa-circle-check text-rose-500 text-xs"></i>' : ''}
                                    ${item.name}
                                </h3>
                                <span class="bg-rose-500/10 text-rose-400 text-xs font-bold px-3 py-1 rounded-full whitespace-nowrap border border-rose-500/10">
                                    ${item.price}
                                </span>
                            </div>
                            <p class="text-xs text-slate-400 leading-relaxed">${item.desc}</p>
                        </div>
                        <div class="mt-4 flex justify-end">
                            <span class="text-[10px] font-semibold tracking-wider uppercase transition-colors card-action-text ${isSelected ? 'text-rose-400' : 'text-slate-500 group-hover:text-rose-400'}">
                                ${isSelected ? '已选择 (再次点击取消)' : '点击加入预约清单'}
                            </span>
                        </div>
                    `;
                    gridDiv.appendChild(card);
                });

                categorySection.appendChild(gridDiv);
                container.appendChild(categorySection);
            });

            if (container.children.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-16 text-slate-500">
                        <i class="fa-solid fa-box-open text-4xl mb-4 text-slate-600"></i>
                        <p>未找到符合 "${searchInput}" 的代肝项目</p>
                    </div>
                `;
            }
        }

        // 一键复制页脚信息
        function copyText(text, label) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('toast');
                const toastMsg = document.getElementById('toastMsg');
                toastMsg.innerText = `已复制 ${label} 到剪贴板！`;
                
                toast.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-2');
                toast.classList.add('opacity-100', 'translate-y-0');

                setTimeout(() => {
                    toast.classList.add('opacity-0', 'pointer-events-none', 'translate-y-2');
                    toast.classList.remove('opacity-100', 'translate-y-0');
                }, 2500);
            }).catch(err => {
                alert('复制失败，请手动选择复制：' + text);
            });
        }

        // 监听点击外部关闭下拉联想框
        document.addEventListener('click', function(e) {
            const searchContainer = document.getElementById('searchInput').parentNode;
            const suggestions = document.getElementById('searchSuggestions');
            if (!searchContainer.contains(e.target)) {
                suggestions.classList.add('hidden');
            }
        });

        window.onload = () => {
            // 初始化检查本地缓存的主题并应用
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light-theme');
                document.getElementById('themeIcon').className = 'fa-solid fa-sun';
            } else {
                document.getElementById('themeIcon').className = 'fa-solid fa-moon';
            }
            switchGame('starRail'); // 默认进入崩坏：星穹铁道并调取对应全局背景
        };
    </script>
</body>
