<html lang="zh-CN">
<head>

    <!-- 引入 Tailwind CSS CDN -->

    <!-- 引入 Font Awesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 3px;
        }
        .tab-active {
            border-bottom: 3px solid #f43f5e;
            color: #f43f5e;
        }
        /* 隐藏原生横向滚动条但保留功能 */
        .scrollbar-none::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-none {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* 平滑色彩过渡 */
        body {
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* 搜索定位卡片高亮闪烁动画 */
        @keyframes card-flash {
            0%, 100% { border-color: #f43f5e; box-shadow: 0 0 15px rgba(244, 63, 94, 0.5); }
            50% { border-color: rgba(244, 63, 94, 0.2); box-shadow: none; }
        }
        .card-flash-effect {
            animation: card-flash 0.8s ease-in-out 3; /* 闪烁3次 */
        }

        /* ================= 浅色主题模式 (Light Mode) 样式覆写 ================= */
        body.light-theme {
            background-color: #f8fafc; /* slate-50 */
            color: #0f172a; /* slate-900 */
        }
        body.light-theme header {
            background-color: rgba(255, 255, 255, 0.85);
            border-color: #e2e8f0;
        }
        body.light-theme header h1 {
            color: #0f172a;
        }
        body.light-theme header p {
            color: #475569;
        }
        body.light-theme #searchInput, body.light-theme #themeToggleBtn {
            background-color: #f1f5f9;
            border-color: #cbd5e1;
            color: #334155;
        }
        body.light-theme #searchInput {
            color: #0f172a;
        }
        body.light-theme #searchInput::placeholder {
            color: #94a3b8;
        }
        body.light-theme #searchSuggestions {
            background-color: #ffffff;
            border-color: #cbd5e1;
        }
        body.light-theme .suggestion-item {
            border-bottom-color: #f1f5f9;
            color: #475569;
        }
        body.light-theme .suggestion-item:hover {
            background-color: #f1f5f9;
        }
        body.light-theme .suggestion-item .font-bold {
            color: #0f172a;
        }
        body.light-theme .category-title-wrap {
            border-left-color: #e11d48;
        }
        body.light-theme .category-title-text {
            color: #0f172a;
        }
        body.light-theme .game-card {
            background-color: #ffffff;
            border-color: #e2e8f0;
        }
        body.light-theme .game-card:hover {
            border-color: #cbd5e1;
            background-color: #f8fafc;
        }
        body.light-theme .game-card.selected {
            background-color: #ffffff;
            border-color: #e11d48;
            box-shadow: 0 10px 15px -3px rgba(225, 29, 72, 0.1), 0 4px 6px -4px rgba(225, 29, 72, 0.1);
        }
        body.light-theme .game-card h3 {
            color: #0f172a;
        }
        body.light-theme .game-card h3.text-rose-400 {
            color: #e11d48;
        }
        body.light-theme .game-card p {
            color: #475569;
        }
        body.light-theme .card-action-text {
            color: #64748b;
        }
        body.light-theme .card-action-text.text-rose-400 {
            color: #e11d48;
        }
        body.light-theme #noticeBanner {
            background-color: rgba(244, 63, 94, 0.05);
            border-color: rgba(244, 63, 94, 0.2);
            color: #9f1239;
        }
        body.light-theme #tab-genshin, body.light-theme #tab-starRail, body.light-theme #tab-endfield {
            color: #64748b;
        }
        body.light-theme #tab-genshin.tab-active, body.light-theme #tab-starRail.tab-active, body.light-theme #tab-endfield.tab-active {
            color: #e11d48;
            border-bottom-color: #e11d48;
        }
        body.light-theme footer {
            background-color: #f1f5f9;
            border-color: #e2e8f0;
        }
        body.light-theme footer h3 {
            color: #334155;
        }
        body.light-theme footer p {
            color: #64748b;
        }
        body.light-theme footer .cursor-pointer {
            background-color: #ffffff;
            border-color: #e2e8f0;
        }
        body.light-theme footer .cursor-pointer:hover {
            background-color: #f8fafc;
        }
        body.light-theme footer .cursor-pointer p {
            color: #475569;
        }
        body.light-theme footer .cursor-pointer .text-sm {
            color: #0f172a;
        }
        
        /* 浅色下的右侧购物车与左侧目录抽屉 */
        body.light-theme #cartDrawer, body.light-theme #tocDrawer {
            background-color: #ffffff;
            border-color: #cbd5e1;
        }
        body.light-theme #cartDrawer .bg-slate-950, body.light-theme #tocDrawer .bg-slate-950 {
            background-color: #f1f5f9;
        }
        body.light-theme #cartDrawer h3 {
            color: #e11d48;
        }
        body.light-theme #tocDrawer h3 {
            color: #4f46e5;
        }
        body.light-theme #cartDrawer .text-slate-200, body.light-theme #tocDrawer .text-slate-200 {
            color: #0f172a;
        }
        body.light-theme #cartItemsList .bg-slate-800\/80, body.light-theme .toc-pill {
            background-color: #f8fafc;
            border-color: #e2e8f0;
            color: #334155;
        }
        body.light-theme #cartItemsList .bg-slate-800\/80:hover, body.light-theme .toc-pill:hover {
            background-color: #f1f5f9;
            color: #0f172a;
        }
        body.light-theme #cartItemsList h4 {
            color: #0f172a;
        }
        body.light-theme #cartItemsList .text-rose-400 {
            color: #e11d48;
        }
        body.light-theme #cartItemsList .bg-slate-700 {
            background-color: #e2e8f0;
            color: #475569;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col font-sans overflow-x-hidden">

    <!-- 导航栏 -->
    <header class="border-b border-slate-800 bg-slate-900/80 backdrop-blur-md sticky top-0 z-50 transition-colors duration-300">
        <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-rose-500 to-indigo-500 flex items-center justify-center font-bold text-lg text-white">
                    祈
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-wider">平平无祈</h1>
                    <p class="text-xs text-slate-400">专业托管 · 高效安全 · 价格透明</p>
                </div>
            </div>

            <div class="flex items-center gap-2 w-full sm:w-auto relative">

                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </span>
                    <input id="searchInput" type="text" placeholder="搜索代肝项目 (如: 那德卡莱、日常、深渊)..." oninput="handleSearchInput()"

                    <!-- 搜索建议下拉弹窗 (新增) -->
                    <div id="searchSuggestions" class="absolute left-0 right-0 top-full mt-2 bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl max-h-64 overflow-y-auto z-50 hidden transition-all duration-300">
                        <!-- 动态渲染建议项 -->
                    </div>
                </div>
                <!-- 主题切换按钮 -->
                <button onclick="toggleTheme()" id="themeToggleBtn" class="p-2 bg-slate-800 border border-slate-700 hover:border-slate-500 rounded-full text-slate-300 transition-all flex items-center justify-center shrink-0 w-10 h-10" title="切换深色/浅色模式">
                    <i class="fa-solid fa-moon text-lg" id="themeIcon"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- 主体区域 -->

        <!-- 游戏选择 Tabs -->
        <div class="flex border-b border-slate-800 mb-6 overflow-x-auto justify-start sm:justify-center gap-2 sm:gap-8 pb-px">
            <button onclick="switchGame('genshin')" id="tab-genshin" class="py-3 px-6 text-slate-400 font-semibold text-base whitespace-nowrap transition-all duration-300 hover:text-slate-200">
                <i class="fa-solid fa-star-of-life mr-2"></i>原神
            </button>
            <button onclick="switchGame('starRail')" id="tab-starRail" class="py-3 px-6 text-slate-400 font-semibold text-base whitespace-nowrap transition-all duration-300 hover:text-slate-200">
                <i class="fa-solid fa-wand-magic-sparkles mr-2"></i>崩坏：星穹铁道
            </button>
            <button onclick="switchGame('endfield')" id="tab-endfield" class="py-3 px-6 text-slate-400 font-semibold text-base whitespace-nowrap transition-all duration-300 hover:text-slate-200">
                <i class="fa-solid fa-shield-halved mr-2"></i>明日方舟：终末地
            </button>
        </div>

        <!-- 游戏顶部公告提示 (动态加载) -->
        <div id="noticeBanner" class="bg-rose-500/10 border border-rose-500/20 rounded-xl p-4 mb-8 text-sm text-rose-200/90 leading-relaxed hidden">
            <!-- 动态注入提示内容 -->
        </div>

        <!-- 价格展示区 -->
        <div id="priceContainer" class="space-y-12">
            <!-- 由 JavaScript 动态渲染 -->
        </div>

    </main>

    <!-- 页脚与联系方式 -->

            <h3 class="text-center text-lg font-bold text-slate-300 mb-6">—— 联系我 & 快速下单 ——</h3>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-8">
                <!-- 微信 -->
                <div onclick="copyText('ppwq1115', '微信')" class="cursor-pointer bg-slate-800 hover:bg-slate-700/80 transition-all rounded-xl p-4 flex items-center justify-between border border-slate-700">
                    <div class="flex items-center gap-3">
                        <i class="fa-brands fa-weixin text-green-400 text-2xl w-8 text-center"></i>
                        <div>
                            <p class="text-xs text-slate-400">微信号 (点击复制)</p>
                            <p class="text-sm font-semibold text-slate-200">ppwq1115</p>
                        </div>
                    </div>
                    <i class="fa-regular fa-copy text-slate-500 text-sm"></i>
                </div>
                <!-- QQ -->
                <div onclick="copyText('2080752235', 'QQ')" class="cursor-pointer bg-slate-800 hover:bg-slate-700/80 transition-all rounded-xl p-4 flex items-center justify-between border border-slate-700">
                    <div class="flex items-center gap-3">
                        <i class="fa-brands fa-qq text-blue-400 text-2xl w-8 text-center"></i>
                        <div>
                            <p class="text-xs text-slate-400">QQ号 (点击复制)</p>
                            <p class="text-sm font-semibold text-slate-200">2080752235</p>
                        </div>
                    </div>
                    <i class="fa-regular fa-copy text-slate-500 text-sm"></i>
                </div>
                <!-- Bilibili -->
                <div onclick="copyText('23396254', 'B站直播间')" class="cursor-pointer bg-slate-800 hover:bg-slate-700/80 transition-all rounded-xl p-4 flex items-center justify-between border border-slate-700">
                    <div class="flex items-center gap-3">
                        <i class="fa-brands fa-bilibili text-pink-400 text-2xl w-8 text-center"></i>
                        <div>
                            <p class="text-xs text-slate-400">B站直播 (7:30 - 22:00)</p>
                            <p class="text-sm font-semibold text-slate-200">房号: 23396254</p>
                        </div>
                    </div>
                    <i class="fa-regular fa-copy text-slate-500 text-sm"></i>
                </div>
            </div>

            <!-- 温馨提示 -->
            <p class="text-xs text-slate-500 text-center max-w-2xl mx-auto leading-relaxed">
                * 深渊、末日等限时挑战未拿满星可根据结果比例合理减免。除上述列出的内容之外，其他任何游戏项目均可接，详情可直接私聊原地定价。

        // 购物车数组，保存已选代的项目
        let cart = [];

        let currentActiveGame = 'genshin';

        // 提取价格的辅助函数
        function parsePrice(priceStr) {
            if (!priceStr) return null;
            // 清理中文括号等内容
            const cleaned = priceStr.replace(/（[^）]*）/g, '').replace(/\([^)]*\)/g, '');
            // 匹配格式如 "45R" 或 "15R / 幕" 中的数字部分
            const match = cleaned.match(/(\d+(?:\.\d+)?)\s*R/i);
            if (match) {
                return parseFloat(match[1]);
            }
            return null;
        }

        // 获取游戏中文友好名称
        function getGameFriendlyName(gameKey) {
            if (gameKey === 'genshin') return '原神';
            if (gameKey === 'starRail') return '星穹铁道';
            if (gameKey === 'endfield') return '终末地';
            return gameKey;
        }

        // 切换代肝项到购物车中
        function toggleCartItem(gameKey, categoryName, itemName, priceStr) {
            const itemId = `${gameKey}-${categoryName}-${itemName}`;
            const index = cart.findIndex(item => item.id === itemId);

            if (index > -1) {
                // 已存在，则移除
                cart.splice(index, 1);
            } else {
                // 不存在，则添加
                const parsed = parsePrice(priceStr);
                cart.push({
                    id: itemId,
                    gameKey: gameKey,
                    gameName: getGameFriendlyName(gameKey),
                    category: categoryName,
                    name: itemName,
                    price: priceStr,
                    parsedPrice: parsed
                });
            }

            updateCartUI();
            renderData(); // 重新渲染列表以更新选中卡片样式
        }

        // 移除单项
        function removeCartItem(itemId) {
            cart = cart.filter(item => item.id !== itemId);
            updateCartUI();
            renderData();
        }

        // 清空购物车
        function clearCart() {
            cart = [];
            updateCartUI();
            renderData();
        }

        // 切换购物车抽屉开关
        function toggleCartDrawer() {
            const drawer = document.getElementById('cartDrawer');
            const backdrop = document.getElementById('cartBackdrop');
            const isOpen = !drawer.classList.contains('translate-x-full');

            if (isOpen) {
                drawer.classList.add('translate-x-full');
                backdrop.classList.add('opacity-0');
                setTimeout(() => backdrop.classList.add('hidden'), 300);
            } else {
                // 确保打开购物车时收起左侧目录抽屉
                closeTocDrawer();
                
                backdrop.classList.remove('hidden');
                setTimeout(() => backdrop.classList.remove('opacity-0'), 10);
                drawer.classList.remove('translate-x-full');
            }
        }

        // 切换左侧目录抽屉开关
        function toggleTocDrawer() {
            const drawer = document.getElementById('tocDrawer');
            const backdrop = document.getElementById('tocBackdrop');
            const isOpen = !drawer.classList.contains('-translate-x-full');

            if (isOpen) {
                closeTocDrawer();
            } else {
                // 确保打开左侧目录时收起右侧购物车
                const cartDrawer = document.getElementById('cartDrawer');
                if (!cartDrawer.classList.contains('translate-x-full')) {
                    cartDrawer.classList.add('translate-x-full');
                }
                
                backdrop.classList.remove('hidden');
                setTimeout(() => backdrop.classList.remove('opacity-0'), 10);
                drawer.classList.remove('-translate-x-full');
            }
        }

        // 强制收起左侧目录抽屉
        function closeTocDrawer() {
            const drawer = document.getElementById('tocDrawer');
            const backdrop = document.getElementById('tocBackdrop');
            if (!drawer.classList.contains('-translate-x-full')) {
                drawer.classList.add('-translate-x-full');
                backdrop.classList.add('opacity-0');
                setTimeout(() => backdrop.classList.add('hidden'), 300);
            }
        }

        // 更新购物车界面UI数据
        function updateCartUI() {
            const floatingCartBtn = document.getElementById('floatingCartBtn');
            const badge = document.getElementById('cartCountBadge');
            const countText = document.getElementById('cartCountText');
            const listContainer = document.getElementById('cartItemsList');
            const totalText = document.getElementById('cartTotalText');

            if (cart.length > 0) {
                floatingCartBtn.classList.remove('hidden');
                badge.innerText = cart.length;
                countText.innerText = `${cart.length} 项`;
            } else {
                floatingCartBtn.classList.add('hidden');
                badge.innerText = '0';
                countText.innerText = '0 项';

            // 渲染列表
            listContainer.innerHTML = '';
            let total = 0;

                    </div>

                totalText.innerText = '0 R';

                            </span>
                        </div>
                        <h4 class="font-bold text-slate-100 text-xs mt-2"><b>${item.name}</b></h4>
                        <p class="text-xs text-rose-400 font-semibold mt-1">价目: ${item.price}</p>
                    </div>
                    <button onclick="removeCartItem('${item.id}')" class="text-slate-400 hover:text-rose-400 p-1 transition-colors">
                        <i class="fa-regular fa-trash-can text-sm"></i>
                    </button>
                `;
                listContainer.appendChild(itemDiv);
            });

            // 累加总额
            totalText.innerHTML = `${total.toFixed(1).replace(/\.0$/, '')} R ${hasComplexPrice ? '<span class="text-xs text-slate-400 font-normal">(含自选/分项/面议)</span>' : ''}`;
        }

        // 一键生成与复制预约清单
        function copyCartOrder() {
            if (cart.length === 0) return;

            let total = 0;
            let hasComplexPrice = false;
            let orderText = `✨ 【平平无祈】订单预约清单 ✨\n\n`;

            // 分组归纳
            const grouped = {};
            cart.forEach(item => {
                if (!grouped[item.gameName]) grouped[item.gameName] = [];
                grouped[item.gameName].push(item);
                if (item.parsedPrice !== null) {
                    total += item.parsedPrice;
                } else {
                    hasComplexPrice = true;
                }
            });

            for (const gameName in grouped) {
                orderText += `🎮 【${gameName}】\n`;
                grouped[gameName].forEach(item => {
                    orderText += `  ▫️ ${item.category} - ${item.name} (${item.price})\n`;
                });
                orderText += `\n`;
            }

            orderText += `-----------------------\n`;
            orderText += `📊 已选项目总数: ${cart.length} 项\n`;
            orderText += `💰 估算合计金额: ${total.toFixed(1).replace(/\.0$/, '')} R ${hasComplexPrice ? '(包含部分分项收费/自选项目/面议)' : ''}\n\n`;
            orderText += `💬 我的联系信息:\n`;
            orderText += `  ▫️ QQ: 2080752235\n`;
            orderText += `  ▫️ 微信: ppwq1115\n`;
            orderText += `* 复制此预约单发给平平无祈，即可高效确认沟通和安排！`;

            navigator.clipboard.writeText(orderText).then(() => {
                const toast = document.getElementById('toast');
                const toastMsg = document.getElementById('toastMsg');
                toastMsg.innerText = `预约订单清单已完美复制！快去私聊粘贴发送吧！`;
                
                toast.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-2');
                toast.classList.add('opacity-100', 'translate-y-0');

                setTimeout(() => {
                    toast.classList.add('opacity-0', 'pointer-events-none', 'translate-y-2');
                    toast.classList.remove('opacity-100', 'translate-y-0');
                }, 3500);
            }).catch(() => {
                alert('复制失败，请截屏发给代肝确认订单。');
            });
        }

        // 切换标签
        function switchGame(gameKey) {
            currentActiveGame = gameKey;
            
            const tabs = ['genshin', 'starRail', 'endfield'];
            tabs.forEach(tab => {
                const btn = document.getElementById(`tab-${tab}`);
                if (tab === gameKey) {
                    btn.classList.add('tab-active', 'text-rose-400');
                    btn.classList.remove('text-slate-400');
                } else {
                    btn.classList.remove('tab-active', 'text-rose-400');
                    btn.classList.add('text-slate-400');
                }
            });

            renderData();
        }

        // 锚点跳转功能
        function scrollToCategory(id) {
            const element = document.getElementById(id);
            if (element) {
                // 导航高度偏移
                const headerOffset = 80; 
                const elementPosition = element.getBoundingClientRect().top;
                const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
                
                window.scrollTo({
                    top: offsetPosition,
                    behavior: "smooth"
                });
            }
        }

        // 点击目录项并自动关闭目录抽屉
        function scrollToCategoryAndClose(id) {
            scrollToCategory(id);
            closeTocDrawer();
        }

        // 搜索栏输入实时展现联想菜单
        function handleSearchInput() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            const suggestions = document.getElementById('searchSuggestions');
            suggestions.innerHTML = '';

            if (!query) {
                suggestions.classList.add('hidden');
                return;
            }

            const gameData = SERVICES_DATA[currentActiveGame];
            const matches = [];

            // 全局搜寻匹配
            gameData.categories.forEach((category, catIndex) => {
                category.items.forEach((item, itemIndex) => {
                    if (item.name.toLowerCase().includes(query) || item.desc.toLowerCase().includes(query)) {
                        matches.push({
                            categoryName: category.name,
                            catIndex: catIndex,
                            itemName: item.name,
                            price: item.price,
                            itemIndex: itemIndex
                        });
                    }
                });
            });

            // 渲染联想框
            if (matches.length > 0) {
                suggestions.classList.remove('hidden');
                // 限制最多展示 8 条，避免下拉太长
                matches.slice(0, 8).forEach(match => {
                    const div = document.createElement('div');
                    div.className = "suggestion-item p-3 border-b border-slate-800/60 cursor-pointer hover:bg-slate-800/50 flex justify-between items-center text-xs text-slate-300 transition-colors";
                    
                    const cardId = `${currentActiveGame}-card-${match.catIndex}-${match.itemIndex}`;
                    div.setAttribute('onclick', `scrollToAndHighlight('${cardId}')`);
                    
                    div.innerHTML = `
                        <div>
                            <span class="text-[9px] text-slate-500 font-semibold mr-1.5">[${match.categoryName}]</span>
                            <span class="font-bold text-slate-200">${match.itemName}</span>
                        </div>
                        <span class="text-rose-400 font-bold text-[9px] bg-rose-500/10 px-2 py-0.5 rounded">${match.price}</span>
                    `;
                    suggestions.appendChild(div);
                });
            } else {
                suggestions.classList.remove('hidden');
                suggestions.innerHTML = `
                    <div class="p-4 text-center text-xs text-slate-500">
                        未找到匹配项目
                    </div>
                `;
            }
        }

        // 快速跳转至对应项目卡片并高亮闪烁
        function scrollToAndHighlight(cardId) {
            // 1. 清空输入框并收起联想菜单
            document.getElementById('searchInput').value = '';
            document.getElementById('searchSuggestions').classList.add('hidden');

            // 2. 重新载入全量列表（以防刚才在过滤状态下）
            renderData();

            // 3. 平滑滚动定位并闪烁
            setTimeout(() => {
                const element = document.getElementById(cardId);
                if (element) {
                    const headerOffset = 80;
                    const elementPosition = element.getBoundingClientRect().top;
                    const offsetPosition = elementPosition + window.pageYOffset - headerOffset;

                    window.scrollTo({
                        top: offsetPosition,
                        behavior: "smooth"
                    });

                    // 4. 触发高亮呼吸闪烁样式
                    element.classList.add('card-flash-effect');
                    setTimeout(() => {
                        element.classList.remove('card-flash-effect');
                    }, 2400); // 0.8s * 3次 = 2.4秒
                }
            }, 100);
        }

        // 切换深浅色主题
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('themeIcon');
            const isLight = body.classList.toggle('light-theme');
            
            if (isLight) {
                icon.className = 'fa-solid fa-sun';
                localStorage.setItem('theme', 'light');
            } else {
                icon.className = 'fa-solid fa-moon';
                localStorage.setItem('theme', 'dark');
            }
        }

        // 渲染页面数据
        function renderData() {
            const searchInput = document.getElementById('searchInput').value.trim().toLowerCase();
            const container = document.getElementById('priceContainer');
            container.innerHTML = '';

            const gameData = SERVICES_DATA[currentActiveGame];

            // 渲染公告提示
            const noticeBanner = document.getElementById('noticeBanner');
            if (gameData.specialNotes && gameData.specialNotes.length > 0) {
                noticeBanner.classList.remove('hidden');
                let notesHtml = `<div class="space-y-1">`;
                gameData.specialNotes.forEach(note => {
                    notesHtml += `<p class="flex items-start gap-2"><i class="fa-solid fa-circle-info mt-1 text-rose-400 shrink-0"></i> <span>${note}</span></p>`;
                });
                notesHtml += `</div>`;
                noticeBanner.innerHTML = notesHtml;
            } else {
                noticeBanner.classList.add('hidden');
            }

            // 动态生成左侧抽屉内的目录跳转列表 (搜索状态下隐藏)
            const tocItemsList = document.getElementById('tocItemsList');
            const floatingTocBtn = document.getElementById('floatingTocBtn');
            tocItemsList.innerHTML = '';
            
            if (gameData.categories.length > 0 && !searchInput) {
                floatingTocBtn.classList.remove('hidden');
                
                gameData.categories.forEach((category, index) => {
                    const btn = document.createElement('button');
                    // 样式为圆角宽扁的目录项卡片
                    btn.className = "toc-pill w-full text-left px-4 py-3 bg-slate-800/60 border border-slate-700/50 hover:bg-slate-800 hover:border-slate-600 rounded-xl text-sm font-semibold text-slate-300 transition-all flex items-center justify-between group";
                    btn.setAttribute('onclick', `scrollToCategoryAndClose('cat-${index}')`);
                    btn.innerHTML = `
                        <span>${category.name}</span>
                        <i class="fa-solid fa-chevron-right text-xs text-slate-500 group-hover:text-slate-300 transition-colors"></i>
                    `;
                    tocItemsList.appendChild(btn);
                });
            } else {
                floatingTocBtn.classList.add('hidden');
            }
            
            // 循环生成各区段卡片
            gameData.categories.forEach((category, index) => {
                const filteredItems = category.items.filter(item => {
                    return item.name.toLowerCase().includes(searchInput) || 
                           item.desc.toLowerCase().includes(searchInput);
                });

                if (filteredItems.length === 0) return;

                const categorySection = document.createElement('div');
                categorySection.id = `cat-${index}`;
                categorySection.className = 'transition-all duration-300';

                const titleHtml = `
                    <div class="flex items-center gap-2 mb-6 border-l-4 border-rose-500 pl-3 mt-4 category-title-wrap">
                        <h2 class="text-lg font-bold text-slate-100 tracking-wide category-title-text">${category.name}</h2>
                        <span class="text-xs bg-rose-500/10 text-rose-400 border border-rose-500/20 px-2 py-0.5 rounded-full">
                            ${filteredItems.length}
                        </span>
                    </div>
                `;
                categorySection.innerHTML = titleHtml;

                const gridDiv = document.createElement('div');
                gridDiv.className = 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6';

                filteredItems.forEach((item, itemIndex) => {
                    const itemId = `${currentActiveGame}-${category.name}-${item.name}`;
                    const isSelected = cart.some(cartItem => cartItem.id === itemId);
                    
                    // 绑定精确的元素卡片ID，便于联想搜索后定位
                    const cardId = `${currentActiveGame}-card-${index}-${itemIndex}`;

                    const card = document.createElement('div');
                    card.id = cardId;
                    card.className = `border rounded-2xl p-5 hover:bg-slate-900 transition-all duration-300 flex flex-col justify-between group cursor-pointer game-card ${
                        isSelected 
                            ? 'bg-slate-900 border-rose-500 shadow-lg shadow-rose-500/10 selected' 
                            : 'bg-slate-900/60 border-slate-800 hover:border-slate-700/80'
                    }`;
                    card.setAttribute('onclick', `toggleCartItem('${currentActiveGame}', '${category.name}', '${item.name}', '${item.price}')`);
                    
                    card.innerHTML = `
                        <div>
                            <div class="flex justify-between items-start gap-4 mb-3">
                                <h3 class="font-bold transition-colors text-base flex items-center gap-1.5 ${isSelected ? 'text-rose-400' : 'text-slate-100'}">
                                    ${isSelected ? '<i class="fa-solid fa-circle-check text-rose-500 text-sm"></i>' : ''}
                                    ${item.name}
                                </h3>
                                <span class="bg-rose-500/10 text-rose-400 text-xs font-bold px-3 py-1 rounded-full whitespace-nowrap border border-rose-500/10">
                                    ${item.price}
                                </span>
                            </div>
                            <p class="text-xs text-slate-400 leading-relaxed">${item.desc}</p>
                        </div>
                        <div class="mt-4 flex justify-end">
                            <span class="text-[10px] font-semibold tracking-wider uppercase transition-colors card-action-text ${isSelected ? 'text-rose-400' : 'text-slate-500 group-hover:text-rose-400'}">
                                ${isSelected ? '已选择 (再次点击取消)' : '点击加入预约清单'}
                            </span>
                        </div>
                    `;
                    gridDiv.appendChild(card);
                });

                categorySection.appendChild(gridDiv);
                container.appendChild(categorySection);
            });

            if (container.children.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-16 text-slate-500">
                        <i class="fa-solid fa-box-open text-4xl mb-4 text-slate-600"></i>
                        <p>未找到符合 "${searchInput}" 的代肝项目</p>
                    </div>
                `;
            }
        }

        // 一键复制页脚信息
        function copyText(text, label) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('toast');
                const toastMsg = document.getElementById('toastMsg');
                toastMsg.innerText = `已复制 ${label} 到剪贴板！`;
                
                toast.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-2');
                toast.classList.add('opacity-100', 'translate-y-0');

                setTimeout(() => {
                    toast.classList.add('opacity-0', 'pointer-events-none', 'translate-y-2');
                    toast.classList.remove('opacity-100', 'translate-y-0');
                }, 2500);
            }).catch(err => {
                alert('复制失败，请手动选择复制：' + text);
            });
        }

        // 监听点击外部关闭下拉联想框
        document.addEventListener('click', function(e) {
            const searchContainer = document.getElementById('searchInput').parentNode;
            const suggestions = document.getElementById('searchSuggestions');
            if (!searchContainer.contains(e.target)) {
                suggestions.classList.add('hidden');
            }
        });

        window.onload = () => {
            // 初始化检查本地缓存的主题并应用
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light-theme');
                document.getElementById('themeIcon').className = 'fa-solid fa-sun';
            } else {
                document.getElementById('themeIcon').className = 'fa-solid fa-moon';
            }
            switchGame('genshin');
        };
    </script>
</body>
</html>
